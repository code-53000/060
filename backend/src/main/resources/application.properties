spring.application.name=travel-management

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/travel_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:travel}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:travel123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai

server.port=8080
