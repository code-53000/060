version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: travel-postgres
    environment:
      POSTGRES_DB: travel_db
      POSTGRES_USER: travel
      POSTGRES_PASSWORD: travel123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel -d travel_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/travel_db
      SPRING_DATASOURCE_USERNAME: travel
      SPRING_DATASOURCE_PASSWORD: travel123
    depends_on:
      postgres:
        condition: service_healthy

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: travel-admin-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  tourist-frontend:
    build:
      context: ./tourist-frontend
      dockerfile: Dockerfile
    container_name: travel-tourist-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres-data:
